services:
  - type: web
    name: nlp-resume-parser-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_md"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
